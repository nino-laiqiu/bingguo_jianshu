          <p>1.建表和列类型有什么关系</p><p>建表的过程就是声明字段。存储相同的数据，不同的列类型所占据的空间和效率是不一样的。</p><p>2.MySQL三大列类型</p><p>数值型（整型 小数）在列类型后加unsigned表示其为无符号类型  zerofill(M)是unsigned类型<br></p><div class="image-package"><img name="CDCFE54B-AEB8-4E5F-9468-4E49CCF961D4.jpg" src="http://upload-images.jianshu.io/upload_images/9049859-3c65b0b72d6c99af.jpg?imageMogr2/auto-orient/strip%7CimageView2/2/w/1240" data-original-src="http://upload-images.jianshu.io/upload_images/9049859-3c65b0b72d6c99af.jpg" data-src="//upload-images.jianshu.io/upload_images/9049859-3c65b0b72d6c99af.jpg?imageMogr2/auto-orient/strip|imageView2/2/w/1240"><br><div class="image-caption" contenteditable="false"></div></div><p>3.char varchar的区别（限制的是字符而不是字节）<br></p><div class="image-package"><img name="7A9E4D95-155B-4E13-9197-3581723E1501.jpg" src="http://upload-images.jianshu.io/upload_images/9049859-cf14b3311d73cbea.jpg?imageMogr2/auto-orient/strip%7CimageView2/2/w/1240" data-original-src="http://upload-images.jianshu.io/upload_images/9049859-cf14b3311d73cbea.jpg" data-src="//upload-images.jianshu.io/upload_images/9049859-cf14b3311d73cbea.jpg?imageMogr2/auto-orient/strip|imageView2/2/w/1240"><br><div class="image-caption" contenteditable="false"></div></div><p>4.如何选取合适的列类型？<br></p><div class="image-package"><img name="71B95E60-13CA-455F-B866-4DA33CF21326.jpg" src="http://upload-images.jianshu.io/upload_images/9049859-6638e0ff11413b3a.jpg?imageMogr2/auto-orient/strip%7CimageView2/2/w/1240" data-original-src="http://upload-images.jianshu.io/upload_images/9049859-6638e0ff11413b3a.jpg" data-src="//upload-images.jianshu.io/upload_images/9049859-6638e0ff11413b3a.jpg?imageMogr2/auto-orient/strip|imageView2/2/w/1240"><br><div class="image-caption" contenteditable="false"></div></div><p>时间效率和空间节约的矛盾</p><p>5.表格的增删改</p><p><br></p><div class="image-package"><img name="4EB712A1-A53E-447E-8252-0E828316429F.jpg" src="http://upload-images.jianshu.io/upload_images/9049859-3143c1f79f9dfd33.jpg?imageMogr2/auto-orient/strip%7CimageView2/2/w/1240" d
