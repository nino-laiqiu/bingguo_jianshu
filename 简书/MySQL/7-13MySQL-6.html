          <p>1.两表查询</p><p>笛卡尔积</p><p>来自两个表的相同名字的列要标明是哪个表</p><p><br></p><p>2.左连接语法及应用</p><p>假设A表在左不动 B表在A表的右边滑动 AB表通过一个关系来筛选B表内容<br></p><div class="image-package"><img name="5BC7BA91-9407-4784-A1A8-D05A4BA00B5C.jpg" src="http://upload-images.jianshu.io/upload_images/9049859-3bfa5bc4430eb90a.jpg?imageMogr2/auto-orient/strip%7CimageView2/2/w/1240" data-original-src="http://upload-images.jianshu.io/upload_images/9049859-3bfa5bc4430eb90a.jpg" data-src="//upload-images.jianshu.io/upload_images/9049859-3bfa5bc4430eb90a.jpg?imageMogr2/auto-orient/strip|imageView2/2/w/1240"><br><div class="image-caption" contenteditable="false"></div></div><p>3.左右内连接的区别<br></p><div class="image-package"><img name="29439E00-BE1D-4B88-A60A-701E12E9F5E2.jpg" src="http://upload-images.jianshu.io/upload_images/9049859-19a6f4eb513e0ac3.jpg?imageMogr2/auto-orient/strip%7CimageView2/2/w/1240" data-original-src="http://upload-images.jianshu.io/upload_images/9049859-19a6f4eb513e0ac3.jpg" data-src="//upload-images.jianshu.io/upload_images/9049859-19a6f4eb513e0ac3.jpg?imageMogr2/auto-orient/strip|imageView2/2/w/1240"><br><div class="image-caption" contenteditable="false"></div></div><p>左右连接可以互换，a left join b 等价于 b right join a</p><p>inner on(内连接）<br></p><div class="image-package"><img name="8BA6D0A6-E5B4-4C96-8CB7-D2B700019C32.jpg" src="http://upload-images.jianshu.io/upload_images/9049859-814f5325cae34bd4.jpg?imageMogr2/auto-orient/strip%7CimageView2/2/w/1240" data-original-src="http://upload-images.jianshu.io/upload_images/9049859-814f5325cae34bd4.jpg" data-src="//upload-images.jianshu.io/upload_images/9049859-814f5325cae34bd4.jpg?imageMogr2/auto-orient/strip|imageView2/2/w/1240"><br><div class="image-caption" contenteditable="false"></div></div><p><br></p><p></p><p>内连接是左右连接的交集</p><p>外连接是左右连接的并集</p><p>4.例题讲解</p><p>左连接 子查询 左连接</p><p><br></p><p>5.union 合并2条或多条语句的结果</p><p>A union B</p>
