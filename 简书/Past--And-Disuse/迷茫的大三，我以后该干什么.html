          <p>迷茫,慌张，效率太低.那是没有目标或者是目标太多，梳理一下这路。</p><p>1.出国，那就要好好准备一下英语了，规划评估自己的实力；但是出国是要花不少钱的，家庭条件不允许的话，就不要想了吧🧐🧐🧐</p><p>2.工作，首先你得是个有梦想的人吧，好好工作，家里有关系的，能安排你的就尽量去吧；没有关系的就去大城市,选择一个好的行业好好踏实奋斗吧；如果你要考研，我感觉要先工作一段时间把,注意一下平凡的陷阱哦.......大家都一样就没什么奋斗的动力了........</p><p>3.考研，是要花费一年的时间的，失败了就是失败者.不全心全意就是慢性自杀.</p><p>愿不断折磨，不畏失败.</p>
