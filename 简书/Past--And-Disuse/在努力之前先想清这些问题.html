        <div class="show-content">
          <p>1.承认自己是普通人，那么普通人的认知，成就极限是什么?</p><p>2.追逐效应广泛存在于生活中，那么我的问题是追逐效应的决定因素是什么?</p><p>3.什么值得我们为之奋斗?</p><p>4.内在动力与什么有关?家庭的因素?情感的偏见?某一刻的成熟，洞见?</p><p>解答:1承认自己是普通人是相当困难的，普通人就意味着踏实做事，反复学习，行动重于技巧。大部分人都难以做到,会高估自己的实力，认为在一段时间里做的事情越多成长就越多，然而事实并非如此，专注于某个方面持之以恒往往会取得难以想象的成就，大部分人却并不是这么行动的，我强调如下原因:人的无尽的欲望，人的内心是趋向无序的</p><p>未完.......</p>
