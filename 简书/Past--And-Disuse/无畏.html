<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无畏</title>
    <style type="text/css" media="all">
      body {
        margin: 0;
        font-family: "Helvetica Neue", Helvetica, Arial, "Hiragino Sans GB", sans-serif;
        font-size: 14px;
        line-height: 20px;
        color: #777;
        background-color: white;
      }
      .container {
        width: 700px;
        margin-right: auto;
        margin-left: auto;
      }

      .post {
        font-family: Georgia, "Times New Roman", Times, "SimSun", serif;
        position: relative;
        padding: 70px;
        bottom: 0;
        overflow-y: auto;
        font-size: 16px;
        font-weight: normal;
        line-height: 25px;
        color: #515151;
      }

      .post h1{
        font-size: 50px;
        font-weight: 500;
        line-height: 60px;
        margin-bottom: 40px;
        color: inherit;
      }

      .post p {
        margin: 0 0 35px 0;
      }

      .post img {
        border: 1px solid #D9D9D9;
      }

      .post a {
        color: #28A1C5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="post">
        <h1 class="title">无畏</h1>
        <div class="show-content">
          <p>生命为什么会有遗憾？因为遗憾是生命里最纯粹最原始的动力了。</p><p>做任何事情都会有一个最初的动机，在实践的旅途中这个动机终将被你我淡忘，实践变得形式化。然而照着这条变形的路继续走下去却是最简单的路了，因为这条路是显然的，值得留恋的，较为曲折的。</p><p>这人生的旅途是痛苦的-却是我们最初的选择；这人生的旅途是记忆的-花费终身去完成那些必须完成的，不可能完成的；这人生的旅途是希望的-我们本可以去实现最纯粹的梦想。</p>
        </div>
      </div>
    </div>
  </body>
</html>
