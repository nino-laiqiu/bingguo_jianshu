<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>确定性见解</title>
    <style type="text/css" media="all">
      body {
        margin: 0;
        font-family: "Helvetica Neue", Helvetica, Arial, "Hiragino Sans GB", sans-serif;
        font-size: 14px;
        line-height: 20px;
        color: #777;
        background-color: white;
      }
      .container {
        width: 700px;
        margin-right: auto;
        margin-left: auto;
      }

      .post {
        font-family: Georgia, "Times New Roman", Times, "SimSun", serif;
        position: relative;
        padding: 70px;
        bottom: 0;
        overflow-y: auto;
        font-size: 16px;
        font-weight: normal;
        line-height: 25px;
        color: #515151;
      }

      .post h1{
        font-size: 50px;
        font-weight: 500;
        line-height: 60px;
        margin-bottom: 40px;
        color: inherit;
      }

      .post p {
        margin: 0 0 35px 0;
      }

      .post img {
        border: 1px solid #D9D9D9;
      }

      .post a {
        color: #28A1C5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="post">
        <h1 class="title">确定性见解</h1>
        <div class="show-content">
          <p>用意义来修饰我们的存在很容易陷入自大和辩证</p><p>我们甚至可以说这种修饰是多余的</p><p>因为只有在自我苦恼和角色混乱的时候，才会追问存在</p><p>那么意义是确定性的人格处境；</p><p>我们甚至很难保证我们一生是条平滑的曲线</p><p>集体的意志又是无上辉煌的</p><p>认同于集体是不是减少了日复一日的挑战和斗争</p><p>那么意义可能是时代潮流的关键秩序；</p><p>破罐是不完美的造物</p><p>破摔是庄严的荒诞</p><p>西西弗斯百无聊赖</p><p>他被赋予的意义是</p><p>英雄主义幻觉亦是悲凉的希望</p>
        </div>
      </div>
    </div>
  </body>
</html>
