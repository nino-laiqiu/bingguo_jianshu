<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对抗失控</title>
    <style type="text/css" media="all">
      body {
        margin: 0;
        font-family: "Helvetica Neue", Helvetica, Arial, "Hiragino Sans GB", sans-serif;
        font-size: 14px;
        line-height: 20px;
        color: #777;
        background-color: white;
      }
      .container {
        width: 700px;
        margin-right: auto;
        margin-left: auto;
      }

      .post {
        font-family: Georgia, "Times New Roman", Times, "SimSun", serif;
        position: relative;
        padding: 70px;
        bottom: 0;
        overflow-y: auto;
        font-size: 16px;
        font-weight: normal;
        line-height: 25px;
        color: #515151;
      }

      .post h1{
        font-size: 50px;
        font-weight: 500;
        line-height: 60px;
        margin-bottom: 40px;
        color: inherit;
      }

      .post p {
        margin: 0 0 35px 0;
      }

      .post img {
        border: 1px solid #D9D9D9;
      }

      .post a {
        color: #28A1C5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="post">
        <h1 class="title">对抗失控</h1>
        <div class="show-content">
          <p>1.这个世界上有着太多的幸存者效应，甚至是常识已经靠不住了</p><p>2.信息的掌控集团，与其说是信息的垄断者，不如说是信息的创造者。</p><p>3.穷人与富人在选择方面存在巨大差异：在目标的制定上是短期的，在沉没成本面前往往抵不住失去后的痛苦，他们也更愿意获取赞美而不是追求意义</p><p>4.闲适的处境下是没有对意义的追求的，也没有挑战的心意。</p>
        </div>
      </div>
    </div>
  </body>
</html>
