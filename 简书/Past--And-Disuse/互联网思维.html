<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互联网思维</title>
    <style type="text/css" media="all">
      body {
        margin: 0;
        font-family: "Helvetica Neue", Helvetica, Arial, "Hiragino Sans GB", sans-serif;
        font-size: 14px;
        line-height: 20px;
        color: #777;
        background-color: white;
      }
      .container {
        width: 700px;
        margin-right: auto;
        margin-left: auto;
      }

      .post {
        font-family: Georgia, "Times New Roman", Times, "SimSun", serif;
        position: relative;
        padding: 70px;
        bottom: 0;
        overflow-y: auto;
        font-size: 16px;
        font-weight: normal;
        line-height: 25px;
        color: #515151;
      }

      .post h1{
        font-size: 50px;
        font-weight: 500;
        line-height: 60px;
        margin-bottom: 40px;
        color: inherit;
      }

      .post p {
        margin: 0 0 35px 0;
      }

      .post img {
        border: 1px solid #D9D9D9;
      }

      .post a {
        color: #28A1C5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="post">
        <h1 class="title">互联网思维</h1>
        <div class="show-content">
          <p>1.用户思维（价值链）——目标用户（市场定位）；目标用户需要什么（品牌和产品规划）；怎么满足目标用户需求（体验打造）</p><p>2.简约思维——人性的惰性</p><p>3.极致思维——渠道 产品（服务）</p><p>4.迭代思维——就一个小的价值链微创新</p><p>5.流量思维——免费的玩法</p><p>6.社会化思维——基于关系的链式传播</p><p>7.大数据思维——核心竞争力-挖掘能力-大数据分析</p><p>8.平台思维——旧平台（开放平台 人本主义）-新平台</p><p>9.跨界思维——综合-垂直整合-水平扩张-毫无预警的颠覆</p>
        </div>
      </div>
    </div>
  </body>
</html>
